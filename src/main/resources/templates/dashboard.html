<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Connect Auth</title>
    <link th:href="@{/main.css}" rel="stylesheet" />
</head>
<body class="bg-gray-950 text-white min-h-screen px-4 py-10">
<div class="max-w-3xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-gray-800 pb-4">
        <h1 class="text-2xl font-bold">Dashboard</h1>
        <a class="text-sm font-medium bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg transition"
           href="/logout">
            Logout
        </a>
    </div>

    <!-- Welcome Message -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
        <h2 class="text-xl font-semibold mb-2">
            Welcome, <span th:text="${name}">User</span> 🎉
        </h2>
        <p class="text-gray-400 text-sm">
            Email: <span th:text="${email}">user@example.com</span>
        </p>
    </div>
</div>
</body>
</html>
