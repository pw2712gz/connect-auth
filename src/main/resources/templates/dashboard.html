<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | Connect Auth</title>
    <link href="/main.css" rel="stylesheet"/>
</head>
<body class="bg-gray-950 text-white min-h-screen px-4 py-10">
<div class="max-w-3xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-gray-800 pb-4">
        <h1 class="text-2xl font-bold">Dashboard</h1>
        <a class="text-sm font-medium bg-gray-800 hover:bg-gray-700 hover:scale-105 transition-transform px-4 py-2 rounded-lg"
           href="/logout">
            Logout
        </a>
    </div>

    <!-- Profile Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 flex flex-col sm:flex-row gap-6 items-center">
        <!-- Avatar -->
        <div>
            <img alt="User Avatar"
                 class="w-24 h-24 rounded-full border border-gray-700"
                 th:if="${avatarUrl}"
                 th:src="${avatarUrl}"/>
            <div class="w-24 h-24 rounded-full flex items-center justify-center text-white text-3xl font-bold"
                 th:if="${avatarUrl == null}"
                 th:style="'background-color:#' + ${T(java.lang.Integer).toHexString(name.hashCode()).substring(0, 6)}">
                <span th:text="${#strings.substring(name, 0, 1)} + ${#strings.substring(name, name.indexOf(' ') + 1, name.indexOf(' ') + 2)}">U</span>
            </div>
        </div>

        <!-- Info -->
        <div class="text-center sm:text-left">
            <h2 class="text-xl font-semibold mb-1">
                Welcome back, <span th:text="${name}">User</span> 👋
            </h2>
            <p class="text-gray-400 text-sm mb-1">
                Email: <span th:text="${email}">user@example.com</span>
            </p>
            <p class="text-gray-500 text-xs">
                Created: <span th:text="${#dates.format(createdAt, 'MMM dd, yyyy HH:mm')}">N/A</span>
            </p>
            <p class="text-gray-500 text-xs">
                Last Login: <span th:text="${#dates.format(lastLogin, 'MMM dd, yyyy HH:mm')}"
                                  th:unless="${lastLogin == null}">N/A</span>
            </p>
        </div>
    </div>
</div>
</body>
</html>
