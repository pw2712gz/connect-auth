<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Connect Auth</title>

    <!-- Tailwind CSS -->
    <link href="/main.css" rel="stylesheet"/>
    <link href="/favicon.ico" rel="icon" type="image/x-icon"/>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen px-4">
<div class="max-w-md w-full p-8 bg-gray-900 rounded-xl shadow-lg border border-gray-800 space-y-6">

    <!-- Favicon as Logo -->
    <div class="flex justify-center">
        <img alt="Connect Auth Logo" class="w-12 h-12" src="/favicon.ico"/>
    </div>

    <!-- Title -->
    <div class="text-center space-y-2">
        <h1 class="text-2xl font-bold tracking-tight">Welcome to Connect Auth</h1>
        <p class="text-sm text-gray-400">Login securely using your Google or GitHub account</p>
    </div>

    <!-- Google Login Button -->
    <a
            aria-label="Sign in with Google"
            class="w-full inline-flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 focus:ring-offset-gray-900"
            href="/oauth2/authorization/google"
            role="button"
    >
        <!-- Google SVG omitted for brevity -->
        Continue with Google
    </a>

    <!-- GitHub Login Button -->
    <a
            aria-label="Sign in with GitHub"
            class="w-full inline-flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 text-white font-semibold px-4 py-2 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 focus:ring-offset-gray-900"
            href="/oauth2/authorization/github"
            role="button"
    >
        <!-- GitHub SVG omitted for brevity -->
        Continue with GitHub
    </a>

    <!-- Messages -->
    <p class="text-green-400 text-sm text-center" th:if="${param.logout}">
        You've been logged out.
    </p>
    <p class="text-red-400 text-sm text-center" th:if="${param.error}">
        Login failed. Please try again.
    </p>
    <p class="text-yellow-400 text-sm text-center" th:if="${param.session}">
        Session expired. Please log in again.
    </p>
    <p class="text-yellow-400 text-sm text-center" th:if="${param.unauthorized}">
        You must log in to access that page.
    </p>
</div>
</body>
</html>
